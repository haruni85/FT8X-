<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT8X</title>
<style>

  :root {
    --bg: #F5F6F4;
    --bg-panel: #FFFFFF;
    --ink: #2B2E28;
    --ink-soft: #767A70;
    --line: #E1E4DD;
    --accent: #6FA888;       /* 草ブロック寄りの落ち着いた緑 */
    --accent-soft: #DCEAE2;
    --highlight: #E0B23A;    /* 金塊っぽい控えめなアクセント */

    --font-display: "Trebuchet MS", "Hiragino Sans", sans-serif;
    --font-body: "Hiragino Sans", "Noto Sans JP", sans-serif;
    --font-pixel: "Courier New", monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: -1px -1px;
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  *:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 80px;
  }

  /* ===== Hero ===== */
  .hero {
    text-align: center;
    padding-bottom: 8px;
  }

  .skin-frame {
    width: 168px;
    height: 280px;
    margin: 0 auto 28px;
    background: var(--bg-panel);
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    image-rendering: pixelated;
  }

  .skin-frame img {
    width: 100%;
    height: auto;
    image-rendering: pixelated;
  }

  .player-name {
    font-family: var(--font-pixel);
    font-size: 30px;
    letter-spacing: 0.04em;
    margin: 0;
  }

  .player-tag {
    margin-top: 10px;
    color: var(--ink-soft);
    font-size: 13px;
    letter-spacing: 0.08em;
  }

  .player-tag .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: 1px;
  }

  /* ===== ブロック風カード共通 ===== */
  .block-card {
    background: var(--bg-panel);
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--line);
    padding: 28px;
    margin-top: 32px;
  }

  .block-card h2 {
    font-family: var(--font-pixel);
    font-size: 14px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 0 0 16px;
  }

  .block-card h2::before {
    content: "▸ ";
    color: var(--accent);
  }

  .about-text {
    margin: 0;
    color: var(--ink);
    font-size: 14px;
  }

  /* ===== タグ ===== */
  .tag-row {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag-row span {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: #3E6850;
    font-size: 12px;
    padding: 5px 10px;
  }

  /* ===== サーバーアドレス ===== */
  .server-box {
    margin-top: 22px;
    background: var(--bg);
    border: 1px dashed var(--accent);
    padding: 16px 18px;
  }

  .server-label {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  .server-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .server-address {
    flex: 1;
    font-family: var(--font-pixel);
    font-size: 14px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    padding: 8px 12px;
    overflow-x: auto;
    white-space: nowrap;
  }

  .copy-btn {
    flex-shrink: 0;
    font-family: var(--font-pixel);
    font-size: 12px;
    background: var(--ink);
    color: var(--bg-panel);
    border: none;
    padding: 9px 14px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .copy-btn:hover {
    background: var(--accent);
  }

  .copy-btn:active {
    transform: scale(0.96);
  }

  .copy-btn.copied {
    background: var(--accent);
  }

  /* ===== リンクリスト ===== */
  .link-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 2px solid var(--ink);
    background: var(--bg-panel);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .link-item:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--accent);
  }

  .link-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    color: var(--bg-panel);
    font-family: var(--font-pixel);
    font-size: 12px;
    font-weight: bold;
  }

  .link-text strong {
    display: block;
    font-size: 14px;
  }

  .link-text span {
    display: block;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .link-arrow {
    margin-left: auto;
    color: var(--ink-soft);
    font-family: var(--font-pixel);
  }

  /* ===== フッター ===== */
  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--ink-soft);
    font-size: 11px;
    letter-spacing: 0.04em;
  }

  @media (max-width: 480px) {
    .player-name { font-size: 24px; }
    .skin-frame { width: 140px; height: 233px; }
  }

  /* ===== 読み込み時のアニメーション ===== */
  .reveal {
    opacity: 0;
    transform: translateY(22px);
    animation: reveal-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes reveal-up {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .skin-frame {
    opacity: 0;
    transform: translateY(10px) scale(0.94);
    animation: skin-pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.05s;
  }

  @keyframes skin-pop {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .player-name,
  .player-tag {
    opacity: 0;
    animation: reveal-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .player-name { animation-delay: 0.22s; }
  .player-tag { animation-delay: 0.32s; }

  .block-card {
    opacity: 0;
    transform: translateY(22px);
    animation: reveal-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .block-card:nth-of-type(1) { animation-delay: 0.44s; }
  .block-card:nth-of-type(2) { animation-delay: 0.56s; }

  .link-item {
    opacity: 0;
    transform: translateY(14px);
    animation: reveal-up 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .link-item:nth-child(1) { animation-delay: 0.68s; }
  .link-item:nth-child(2) { animation-delay: 0.76s; }
  .link-item:nth-child(3) { animation-delay: 0.84s; }

  footer.reveal { animation-delay: 0.95s; }

  @media (prefers-reduced-motion: reduce) {
    .reveal, .skin-frame, .player-name, .player-tag, .block-card, .link-item, footer {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>

<script>
  // サーバーアドレスのコピー機能
  (function setupCopyButton() {
    const btn = document.getElementById('copy-btn');
    const addressEl = document.getElementById('server-address');

    btn.addEventListener('click', async () => {
      const text = addressEl.textContent.trim();

      try {
        await navigator.clipboard.writeText(text);
      } catch (err) {
        // クリップボードAPIが使えない場合のフォールバック
        const tmp = document.createElement('textarea');
        tmp.value = text;
        tmp.style.position = 'fixed';
        tmp.style.opacity = '0';
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
      }

      const originalText = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');

      setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.remove('copied');
      }, 1500);
    });
  })();
</script>
